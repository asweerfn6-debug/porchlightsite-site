function WaitlistForm({ compact }) {
  const [email, setEmail] = useState("");
  const [role, setRole] = useState("homeowner");
  const [heardFrom, setHeardFrom] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!email.trim() || !email.includes("@")) { setError("Enter a valid email."); return; }
    if (!supabaseClient) { setError("Can't reach the database right now — try again shortly."); return; }
    setError(""); setSaving(true);
    const { error: insertErr } = await supabaseClient.from("waitlist_signups").insert({ email: email.trim().toLowerCase(), interest: role, heard_from: heardFrom || null });
    setSaving(false);
    if (insertErr) {
      setError(insertErr.message.toLowerCase().includes("duplicate") ? "That email's already on the list — we'll be in touch." : insertErr.message);
      return;
    }
    setSubmitted(true);
  };

  if (submitted) {
    return (
      <div className="pl-confirm"><IconCheck /> You're on the list — we'll email you the day it opens, and what we finished in the meantime.</div>
    );
  }

  return (
    <form onSubmit={submit} className={compact ? "" : "pl-form-card"} style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
      <div className="pl-field" style={{ flex: "1 1 220px", marginBottom: 0 }}>
        <label htmlFor="waitlist-email">Email</label>
        <input className="pl-input" id="waitlist-email" type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" required />
      </div>
      <div className="pl-field" style={{ flex: "0 0 auto", marginBottom: 0 }}>
        <label htmlFor="waitlist-role">I'm a</label>
        <select className="pl-select" id="waitlist-role" value={role} onChange={(e) => setRole(e.target.value)}>
          <option value="homeowner">Homeowner / parent</option>
          <option value="teen">Teen worker</option>
        </select>
      </div>
      <div className="pl-field" style={{ flex: "0 0 auto", marginBottom: 0 }}>
        <label htmlFor="waitlist-heard">Heard from (optional)</label>
        <select className="pl-select" id="waitlist-heard" value={heardFrom} onChange={(e) => setHeardFrom(e.target.value)}>
          <option value="">Select one</option>
          {REFERRAL_OPTIONS.map((o) => <option key={o.key} value={o.key}>{o.label}</option>)}
        </select>
      </div>
      <button type="submit" className="pl-btn pl-btn-amber" disabled={saving} style={{ height: 46 }}>{saving ? "Joining…" : "Join the waitlist"}</button>
      {error && <div className="pl-age-note" style={{ flexBasis: "100%" }}><IconAlert /><span>{error}</span></div>}
    </form>
  );
}

function ReferralModal({ user }) {
  const [visible, setVisible] = useState(false);
  const [checked, setChecked] = useState(false);
  const [shouldShow, setShouldShow] = useState(false);
  const [saving, setSaving] = useState(false);
  const [otherText, setOtherText] = useState("");
  const [showOtherInput, setShowOtherInput] = useState(false);

  useEffect(() => {
    let active = true;
    async function check() {
      if (!user || !supabaseClient) { setChecked(true); return; }
      const { data } = await supabaseClient.from("referral_sources").select("id").eq("user_id", user.id).single();
      if (!active) return;
      setChecked(true);
      if (!data) setShouldShow(true);
    }
    check();
    return () => { active = false; };
  }, [user]);

  useEffect(() => {
    if (!checked || !shouldShow) return;
    const t = setTimeout(() => setVisible(true), 1400); // "slowly pops up"
    return () => clearTimeout(t);
  }, [checked, shouldShow]);

  const dismiss = async (source, detail) => {
    setVisible(false);
    setTimeout(() => setShouldShow(false), 400);
    if (!supabaseClient || !user) return;
    await supabaseClient.from("referral_sources").insert({ user_id: user.id, source, detail: detail || null });
  };

  const pick = async (opt) => {
    if (opt.key === "other") { setShowOtherInput(true); return; }
    setSaving(true);
    await dismiss(opt.key, null);
    setSaving(false);
  };

  const submitOther = async () => {
    setSaving(true);
    await dismiss("other", otherText.trim() || null);
    setSaving(false);
  };

  if (!checked || !shouldShow) return null;

  return (
    <div className={"pl-modal-overlay" + (visible ? " pl-modal-visible" : "")}>
      <div className="pl-modal-card">
        <button className="pl-modal-close" onClick={() => dismiss("skipped", null)} aria-label="Close">✕</button>
        <div className="pl-eyebrow"><Beacon /> Quick question</div>
        <h2 style={{ fontSize: 24, marginBottom: 6 }}>How'd you hear about Porchlight? 🎉</h2>
        <p style={{ color: "var(--ink-soft)", fontSize: 14.5, margin: 0 }}>Takes two seconds, and it genuinely helps us know where to focus.</p>

        {!showOtherInput ? (
          <div className="pl-modal-grid">
            {REFERRAL_OPTIONS.map((o) => (
              <button key={o.key} className="pl-modal-option" onClick={() => pick(o)} disabled={saving}>
                <span className="pl-modal-emoji">{o.emoji}</span> {o.label}
              </button>
            ))}
          </div>
        ) : (
          <div style={{ marginTop: 20, position: "relative", zIndex: 1 }}>
            <div className="pl-field">
              <label htmlFor="referral-other">Tell us where!</label>
              <input className="pl-input" id="referral-other" value={otherText} onChange={(e) => setOtherText(e.target.value)} placeholder="e.g. a local Facebook group" />
            </div>
            <button className="pl-btn pl-btn-amber" onClick={submitOther} disabled={saving} style={{ width: "100%" }}>{saving ? "Saving…" : "Submit"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// Turns a typed street address into { lat, lng, areaLabel } using Mapbox's
// Geocoding API. areaLabel is derived from the same response (neighborhood +
// town, or just town/region if no neighborhood is known) — no second API call.
// This is a normal client-side geocoding lookup (Mapbox explicitly supports
// this with a public token). It is NOT the randomization step; that happens
// only in the database.
async function geocodeAddress(address) {
  if (!MAPBOX_ACCESS_TOKEN || MAPBOX_ACCESS_TOKEN.startsWith("PASTE_YOUR")) {
    throw new Error("Mapbox isn't configured yet — paste your public token into MAPBOX_ACCESS_TOKEN near the top of the file.");
  }
  const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(address)}.json?access_token=${MAPBOX_ACCESS_TOKEN}&limit=1`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("Couldn't reach the map service to locate that address.");
  const data = await res.json();
  const feature = data.features && data.features[0];
  if (!feature) throw new Error("Couldn't find that address — check it and try again.");
  const [lng, lat] = feature.center;

  const context = feature.context || [];
  const find = (prefix) => {
    const entry = context.find((c) => c.id && c.id.startsWith(prefix));
    return entry ? entry.text : "";
  };
  const neighborhood = find("neighborhood");
  const town = find("place") || find("locality") || find("district");
  const region = find("region");
  const areaLabel = [neighborhood, town].filter(Boolean).join(", ") || [town, region].filter(Boolean).join(", ") || region || "";

  return { lat, lng, areaLabel };
}

function PostJobPage({ navigate, homeownerStatus, user }) {
  const [submitted, setSubmitted] = useState(false);
  const [plan, setPlan] = useState("single");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState("");
  const [title, setTitle] = useState("");
  const [category, setCategory] = useState("");
  const [pay, setPay] = useState("");
  const [date, setDate] = useState("");
  const [startTime, setStartTime] = useState("");
  const [endTime, setEndTime] = useState("");
  const [area, setArea] = useState("");
  const [exactAddress, setExactAddress] = useState("");
  const [desc, setDesc] = useState("");
  const [areaLoading, setAreaLoading] = useState(false);
  const geocodeCacheRef = useRef({ address: "", result: null });

  const handleAddressBlur = async () => {
    const addr = exactAddress.trim();
    if (!addr || area.trim()) return; // only auto-fill when the area field is still empty
    if (geocodeCacheRef.current.address === addr && geocodeCacheRef.current.result) {
      if (geocodeCacheRef.current.result.areaLabel) setArea(geocodeCacheRef.current.result.areaLabel);
      return;
    }
    setAreaLoading(true);
    try {
      const result = await geocodeAddress(addr);
      geocodeCacheRef.current = { address: addr, result };
      if (result.areaLabel && !area.trim()) setArea(result.areaLabel);
    } catch (e) {
      // Silent on purpose — this is just a convenience auto-fill.
      // Real validation happens at submit time, where the error does show.
    } finally {
      setAreaLoading(false);
    }
  };

  const submitJob = async (e) => {
    e.preventDefault();
    if (!supabaseClient || !user) { setError("You need to be logged in as a homeowner to post a job."); return; }
    const payNum = parseFloat(String(pay).replace(/[^0-9.]/g, ""));
    if (!title.trim()) { setError("Give the job a title."); return; }
    if (!category) { setError("Choose a category."); return; }
    if (!payNum || payNum <= 0) { setError("Enter a valid pay amount, e.g. 25."); return; }
    if (!date || !startTime || !endTime) { setError("Fill in the date, start time, and end time."); return; }
    if (!desc.trim()) { setError("Add a short description."); return; }
    if (!area.trim()) { setError("Add a neighborhood or general area — this is the only location teens see before applying."); return; }
    if (!exactAddress.trim()) { setError("Add the exact work address — this stays private and is only shared with a teen you accept."); return; }
    setError("");
    setSaving(true);
    let coords;
    try {
      const addr = exactAddress.trim();
      if (geocodeCacheRef.current.address === addr && geocodeCacheRef.current.result) {
        coords = geocodeCacheRef.current.result;
      } else {
        coords = await geocodeAddress(addr);
        geocodeCacheRef.current = { address: addr, result: coords };
      }

      setSaving(false);
      setError(geoErr.message);
      return;
    }
    const { error: insertErr } = await supabaseClient.from("jobs").insert({
      homeowner_id: user.id,
      title: title.trim(),

      description: desc.trim(),
      pay_amount: payNum,
      job_date: date,
      start_time: startTime,

      exact_lat: coords.lat,
      exact_lng: coords.lng,

const ALL_CATS = ["All", "Yard work", "Pet care", "Tutoring", "Light chores", "Car washing"];

function JobMap({ jobs, onViewJob }) {
  const mapContainer = useRef(null);
  const mapRef = useRef(null);
  const popupRef = useRef(null);
  const [mapReady, setMapReady] = useState(false);
  const [mapMissing, setMapMissing] = useState(false);

  useEffect(() => {
    if (!window.mapboxgl) { setMapMissing(true); return; }
    if (!mapContainer.current || mapRef.current) return;

    const map = new window.mapboxgl.Map({
      container: mapContainer.current,
      style: "mapbox://styles/mapbox/light-v11",
      center: [-73.26, 41.14], // rough Fairfield County, CT default view
      zoom: 10,
    });
    map.addControl(new window.mapboxgl.NavigationControl(), "top-right");
    mapRef.current = map;

    map.on("load", () => {
      map.addSource("jobs", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] },
        cluster: true,
        clusterMaxZoom: 14,
        clusterRadius: 45,
      });

      map.addLayer({
        id: "clusters",
        type: "circle",
        source: "jobs",
        filter: ["has", "point_count"],
        paint: {
          "circle-color": "#2E5C8A",
          "circle-radius": ["step", ["get", "point_count"], 16, 5, 22, 15, 28],
          "circle-opacity": 0.88,
        },
      });
      map.addLayer({
        id: "cluster-count",
        type: "symbol",
        source: "jobs",
        filter: ["has", "point_count"],
        layout: { "text-field": ["get", "point_count_abbreviated"], "text-size": 13, "text-font": ["DIN Offc Pro Medium", "Arial Unicode MS Bold"] },
        paint: { "text-color": "#fff" },
      });
      map.addLayer({
        id: "unclustered-point",
        type: "circle",
        source: "jobs",
        filter: ["!", ["has", "point_count"]],
        paint: {
          "circle-color": "#F2A93B",
          "circle-radius": 9,
          "circle-stroke-width": 2,
          "circle-stroke-color": "#fff",
        },
      });

      map.on("click", "clusters", (e) => {
        const features = map.queryRenderedFeatures(e.point, { layers: ["clusters"] });
        const clusterId = features[0].properties.cluster_id;
        map.getSource("jobs").getClusterExpansionZoom(clusterId, (err, zoom) => {
          if (err) return;
          map.easeTo({ center: features[0].geometry.coordinates, zoom });
        });
      });

      map.on("click", "unclustered-point", (e) => {
        const feature = e.features[0];
        const { id, title, category, public_area_label, pay_amount, job_date } = feature.properties;
        const coords = feature.geometry.coordinates.slice();
        if (popupRef.current) popupRef.current.remove();
        const node = document.createElement("div");
        node.style.fontFamily = "'Plus Jakarta Sans', sans-serif";
        node.style.minWidth = "190px";
        node.innerHTML =
          '<div style="font-size:12px;color:#5B6472;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;">' + category + '</div>' +
          '<div style="font-weight:700;margin-bottom:4px;">' + title + '</div>' +
          '<div style="font-size:13px;color:#5B6472;margin-bottom:2px;">' + public_area_label + '</div>' +
          '<div style="font-size:13px;color:#5B6472;margin-bottom:10px;">$' + pay_amount + ' \u00b7 ' + job_date + '</div>' +
          '<button id="view-job-' + id + '" style="background:#F2A93B;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;width:100%;">View Job</button>';
        popupRef.current = new window.mapboxgl.Popup({ offset: 12 }).setLngLat(coords).setDOMContent(node).addTo(map);
        setTimeout(() => {
          const btn = document.getElementById("view-job-" + id);
          if (btn) btn.onclick = () => onViewJob(id);
        }, 0);
      });

      map.on("mouseenter", "unclustered-point", () => { map.getCanvas().style.cursor = "pointer"; });
      map.on("mouseleave", "unclustered-point", () => { map.getCanvas().style.cursor = ""; });
      map.on("mouseenter", "clusters", () => { map.getCanvas().style.cursor = "pointer"; });
      map.on("mouseleave", "clusters", () => { map.getCanvas().style.cursor = ""; });

      setMapReady(true);
    });

    return () => { map.remove(); mapRef.current = null; };
  }, []);

  useEffect(() => {
    const map = mapRef.current;
    if (!map || !mapReady) return;
    const source = map.getSource("jobs");
    if (!source) return;
    const features = jobs
      .filter((j) => j.public_lat && j.public_lng)
      .map((j) => ({
        type: "Feature",
        geometry: { type: "Point", coordinates: [j.public_lng, j.public_lat] },
        properties: { id: j.id, title: j.title, category: j.category, public_area_label: j.public_area_label || "", pay_amount: j.pay_amount, job_date: j.job_date },
      }));
    source.setData({ type: "FeatureCollection", features });
    if (features.length) {
      const bounds = new window.mapboxgl.LngLatBounds();
      features.forEach((f) => bounds.extend(f.geometry.coordinates));
      map.fitBounds(bounds, { padding: 60, maxZoom: 13, duration: 0 });
    }
  }, [jobs, mapReady]);

  if (mapMissing) {
    return (
      <div className="pl-note-card" style={{ marginBottom: 20 }}>
        <p style={{ margin: 0 }}>Map isn't available yet — add a Mapbox public token to <code>MAPBOX_ACCESS_TOKEN</code> near the top of the file, and make sure the Mapbox GL JS script is loaded.</p>
      </div>
    );
  }

  return (
    <div style={{ marginBottom: 24 }}>
      <div ref={mapContainer} style={{ width: "100%", height: 380, borderRadius: "var(--radius)", overflow: "hidden", border: "1px solid var(--line)" }} />
      <p style={{ color: "var(--ink-soft)", fontSize: 13, marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>
        <IconMap /> Approximate location shown for safety. Exact addresses are never public.
      </p>
    </div>
  );
}

      const { data, error } = await supabaseClient
        .from("jobs")
        .select("id, title, category, description, pay_amount, job_date, start_time, end_time, status, public_lat, public_lng, public_area_label")
        .eq("status", "open")
        .order("created_at", { ascending: false });
      if (active) {
        if (!error && data) setJobs(data);
        setLoading(false);
      }
    }
    loadJobs();
    return () => { active = false; };
  }, []);

  useEffect(() => {
    let active = true;
    async function checkConsent() {
      if (!supabaseClient || !user || user.role !== "teen") { if (active) setHasConsent(false); return; }
      const { data } = await supabaseClient.from("parent_consents").select("id").eq("teen_id", user.id).single();
      if (active) setHasConsent(!!data);
    }
    checkConsent();
    return () => { active = false; };
  }, [user]);

  const allowedCats = categoriesForAge(ageGroup === "13" ? "13" : "14plus");
  const visibleChipCats = ageGroup === "13" ? ["All", ...HOUSEHOLD_CATS] : ALL_CATS;

  const setAge = (g) => {
    setAgeGroup(g);
    setFilter("All"); // reset filter so a now-locked category chip can't stay selected
  };

  const visibleJobs = jobs.filter((j) => allowedCats.includes(j.category));
  const list = filter === "All" ? visibleJobs : visibleJobs.filter((j) => j.category === filter);
  const lockedJobsCount = jobs.length - visibleJobs.length;

  const applyToJob = async (job) => {
    setApplyError("");
    if (!user) { setApplyError("Log in as a teen worker to apply for jobs."); return; }
    if (user.role === "teen" && !hasConsent) { setApplyError("A parent needs to complete the consent form with you before you can apply."); return; }
    if (!supabaseClient) return;
    const { error } = await supabaseClient.from("job_applications").insert({ job_id: job.id, teen_id: user.id });
    if (error) {
      setApplyError(error.message.toLowerCase().includes("duplicate") ? "You've already applied to this job." : error.message);
      return;
    }
    setAppliedIds((prev) => [...prev, job.id]);
    setApplied(job.title);
  };

  const scrollToJob = (jobId) => {
    const node = document.getElementById("job-card-" + jobId);
    if (node) node.scrollIntoView({ behavior: "smooth", block: "center" });
  };

  return (
    <section className="pl-section">
      <div className="pl-wrap">
        <div className="pl-eyebrow"><Beacon /> Browse jobs</div>
        <h1 style={{ fontSize: "clamp(28px,3.6vw,40px)", marginBottom: 12 }}>Local jobs, ready to apply for.</h1>
        <p className="pl-lede" style={{ marginBottom: 20 }}>Every listing below has already passed Porchlight's category and safety review.</p>

        <JobMap jobs={list} onViewJob={scrollToJob} />

        <div className="pl-age-gate">
          <div>
            <div style={{ fontWeight: 800, fontSize: 14.5, marginBottom: 4 }}>I am...</div>
            <div style={{ color: "var(--ink-soft)", fontSize: 13.5 }}>This changes which job categories you're shown, based on Connecticut's age rules for minors' work.</div>
          </div>
          <div className="pl-age-toggle" role="group" aria-label="Select your age group">
            <button className="pl-age-btn" aria-pressed={ageGroup === "13"} onClick={() => setAge("13")}>13 years old</button>
            <button className="pl-age-btn" aria-pressed={ageGroup === "14plus"} onClick={() => setAge("14plus")}>14–17 years old</button>
          </div>
        </div>

        {ageGroup === "13" && (
          <div className="pl-age-note">
            <IconAlert />
            <span>At 13, Porchlight only shows household-style jobs — pet care, tutoring, and light chores. Yard work and car washing unlock at 14, in line with Connecticut's minimum working-age rules. {lockedJobsCount > 0 && `(${lockedJobsCount} job${lockedJobsCount === 1 ? "" : "s"} hidden for this reason.)`}</span>
          </div>
        )}

        {user?.role === "teen" && hasConsent === false && (
          <div className="pl-age-note" style={{ marginBottom: 16 }}>
            <IconAlert />
            <span>You need a parent to complete the <a href="#" onClick={(e) => { e.preventDefault(); navigate("consent"); }}>consent & waiver form</a> with you before you can apply to jobs.</span>
          </div>
        )}

        {applied && (
          <div className="pl-confirm"><IconCheck /> Applied to "{applied}" — the homeowner will be notified to review it.</div>
        )}
        {applyError && (
          <div className="pl-age-note"><IconAlert /><span>{applyError}</span></div>
        )}

        <div className="pl-job-filters">
          {visibleChipCats.map((c) => (
            <button key={c} className={`pl-filter-chip ${filter === c ? "active" : ""}`} onClick={() => setFilter(c)}>{c}</button>
          ))}
        </div>

        {loading && <p style={{ color: "var(--ink-soft)" }}>Loading jobs…</p>}

        <div className="pl-job-grid">
          {list.map((j) => (
            <div className="pl-job-card" id={"job-card-" + j.id} key={j.id}>
              <div className="pl-job-top">
                <span className="pl-job-cat">{j.category}</span>
                <span className="pl-job-pay">${j.pay_amount}</span>
              </div>
              <h3>{j.title}</h3>
              <div className="pl-job-meta">
                <span><IconMap />{j.description}</span>
                <span><IconClock />{j.start_time?.slice(0, 5)}–{j.end_time?.slice(0, 5)}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                <span style={{ fontSize: 13, color: "var(--ink-soft)" }}>{j.job_date}</span>
                <button
                  className="pl-btn pl-btn-amber pl-btn-sm"
                  disabled={appliedIds.includes(j.id) || (user?.role === "teen" && hasConsent === false)}
                  onClick={() => applyToJob(j)}
                >
                  {appliedIds.includes(j.id) ? "Applied" : "Apply"}
                </button>
              </div>
            </div>
          ))}
          {!loading && list.length === 0 && (
            <p style={{ color: "var(--ink-soft)" }}>No jobs in this category right now — check back soon.</p>
          )}
        </div>
      </div>
    </section>
  );
}

function RatingStars({ value, onChange, disabled }) {
  const [hover, setHover] = useState(0);
  return (
    <div style={{ display: "flex", gap: 6 }} role="radiogroup" aria-label="Star rating">
      {[1, 2, 3, 4, 5].map((n) => {
        const filled = (hover || value) >= n;
        return (
          <button
            key={n}
            type="button"
            role="radio"
            aria-checked={value === n}
            aria-label={`${n} star${n > 1 ? "s" : ""}`}
            disabled={disabled}
            onMouseEnter={() => !disabled && setHover(n)}
            onMouseLeave={() => setHover(0)}
            onClick={() => !disabled && onChange(n)}
            style={{ background: "none", border: "none", cursor: disabled ? "default" : "pointer", padding: 2, color: filled ? "var(--amber-deep)" : "var(--line)" }}
          >
            <svg viewBox="0 0 24 24" width="30" height="30" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="1.6">
              <path d="M12 17.3l-5.4 3 1.4-6L3 9.9l6.1-.5L12 3.8l2.9 5.6 6.1.5-5 4.4 1.4 6z" />
            </svg>
          </button>
        );
      })}
    </div>
  );
}

function RateJobPage({ navigate, user, openChat }) {
  const [openJobs, setOpenJobs] = useState([]);
  const [assignedJobs, setAssignedJobs] = useState([]);
  const [completedJobs, setCompletedJobs] = useState([]);
  const [teenNames, setTeenNames] = useState({});
  const [loading, setLoading] = useState(true);
  const [ratingTarget, setRatingTarget] = useState(null);
  const [stars, setStars] = useState(0);
  const [note, setNote] = useState("");
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);
  const [success, setSuccess] = useState("");

  const loadData = async () => {
    if (!supabaseClient || !user) { setLoading(false); return; }
    setLoading(true);
    setError("");

    const { data: jobsData, error: jobsErr } = await supabaseClient
      .from("jobs")
      .select("id, title, job_date, status, job_applications(id, teen_id, status, profiles(full_name))")
      .eq("homeowner_id", user.id)
      .eq("status", "open");
    if (jobsErr) { setError("Couldn't load open jobs: " + jobsErr.message); setLoading(false); return; }
    const pending = (jobsData || [])
      .map((j) => ({ ...j, applicants: (j.job_applications || []).filter((a) => a.status === "pending") }))
      .filter((j) => j.applicants.length > 0);
    setOpenJobs(pending);

    const { data: assigned, error: assignedErr } = await supabaseClient
      .from("jobs")
      .select("id, title, job_date, assigned_teen_id")
      .eq("homeowner_id", user.id)
      .eq("status", "assigned");
    if (assignedErr) { setError("Couldn't load assigned jobs: " + assignedErr.message); setLoading(false); return; }
    setAssignedJobs(assigned || []);

    const { data: done, error: doneErr } = await supabaseClient
      .from("jobs")
      .select("id, title, job_date, assigned_teen_id, ratings(stars, note)")
      .eq("homeowner_id", user.id)
      .eq("status", "completed")
      .order("job_date", { ascending: false });
    if (doneErr) { setError("Couldn't load completed jobs: " + doneErr.message); setLoading(false); return; }
    setCompletedJobs(done || []);

    const teenIds = [...new Set([...(assigned || []).map((j) => j.assigned_teen_id), ...(done || []).map((j) => j.assigned_teen_id)].filter(Boolean))];
    if (teenIds.length) {
      const { data: profs } = await supabaseClient.from("profiles").select("id, full_name").in("id", teenIds);
      const map = {};
      (profs || []).forEach((p) => { map[p.id] = p.full_name; });
      setTeenNames(map);
    }
    setLoading(false);
  };

  useEffect(() => { loadData(); }, [user]);

  const acceptApplicant = async (job, applicant) => {
    setError(""); setSuccess(""); setSaving(true);
    const { error: appErr } = await supabaseClient.from("job_applications").update({ status: "accepted" }).eq("id", applicant.id);
    if (appErr) { setSaving(false); setError(appErr.message); return; }
    const { error: jobErr } = await supabaseClient.from("jobs").update({ status: "assigned", assigned_teen_id: applicant.teen_id }).eq("id", job.id);
    setSaving(false);
    if (jobErr) { setError(jobErr.message); return; }
    if (openChat) { openChat(job.id); return; }
    setSuccess(`Accepted ${applicant.profiles?.full_name || "the applicant"} for "${job.title}" — they can now see the exact address for this job.`);
    loadData();
  };

  const openRatingForm = (job) => {
    setSuccess("");
    setRatingTarget({ jobId: job.id, teenId: job.assigned_teen_id, jobTitle: job.title, teenName: teenNames[job.assigned_teen_id] || "this teen" });
    setStars(0); setNote(""); setError("");
  };

  const submitRating = async () => {
    if (!ratingTarget) return;
    if (stars === 0) { setError("Choose a star rating before submitting."); return; }
    setError(""); setSaving(true);
    const { error: updateErr } = await supabaseClient
      .from("jobs")
      .update({ status: "completed" })
      .eq("id", ratingTarget.jobId);
    if (updateErr) { setSaving(false); setError(updateErr.message); return; }
    const { error: ratingErr } = await supabaseClient.from("ratings").insert({
      job_id: ratingTarget.jobId,
      homeowner_id: user.id,
      teen_id: ratingTarget.teenId,
      stars,
      note,
    });
    setSaving(false);
    if (ratingErr) { setError(ratingErr.message); return; }
    setSuccess(`Marked "${ratingTarget.jobTitle}" complete and rated ${ratingTarget.teenName}.`);
    setRatingTarget(null);
    loadData();
  };

  if (!user) {
    return (
      <section className="pl-section">
        <div className="pl-wrap" style={{ maxWidth: 560 }}>
          <div className="pl-eyebrow"><Beacon /> Homeowner only</div>
          <h1 style={{ fontSize: "clamp(26px,3.2vw,36px)", marginBottom: 12 }}>Log in as a homeowner to rate jobs.</h1>
          <button className="pl-btn pl-btn-amber" onClick={() => navigate("login")}>Log in / sign up</button>
        </div>
      </section>
    );
  }

  if (user.role !== "homeowner") {
    return (
      <section className="pl-section">
        <div className="pl-wrap" style={{ maxWidth: 560 }}>
          <div className="pl-eyebrow"><Beacon /> Homeowner only</div>
          <h1 style={{ fontSize: "clamp(26px,3.2vw,36px)", marginBottom: 12 }}>This page is for homeowners.</h1>
          <p className="pl-lede" style={{ marginBottom: 24 }}>You're logged in as a teen worker. This page is where homeowners accept applicants and rate completed jobs.</p>
          <button className="pl-btn pl-btn-amber" onClick={() => navigate("browse-jobs")}>Browse jobs</button>
        </div>
      </section>
    );
  }

  return (
    <section className="pl-section">
      <div className="pl-wrap" style={{ maxWidth: 640 }}>
        <div className="pl-eyebrow"><Beacon /> Homeowner only</div>
        <h1 style={{ fontSize: "clamp(26px,3.2vw,36px)", marginBottom: 10 }}>Rate a job</h1>
        <p className="pl-lede" style={{ marginBottom: 28 }}>Pick an applicant to mark a job done and leave a rating — this closes the listing and counts toward their badge tier.</p>

        {success && <div className="pl-confirm" style={{ marginBottom: 20 }}><IconCheck /> {success}</div>}
        {error && <div className="pl-age-note" style={{ marginBottom: 20 }}><IconAlert /><span>{error}</span></div>}
        {loading && <p style={{ color: "var(--ink-soft)" }}>Loading your jobs…</p>}

        {ratingTarget ? (
          <div className="pl-form-card" style={{ marginBottom: 28 }}>
            <h3 style={{ marginBottom: 4 }}>{ratingTarget.jobTitle}</h3>
            <p style={{ color: "var(--ink-soft)", fontSize: 14.5, marginBottom: 18 }}>Rating {ratingTarget.teenName}</p>
            <div className="pl-field">
              <label>How did the job go?</label>
              <RatingStars value={stars} onChange={setStars} disabled={saving} />
            </div>
            <div className="pl-field">
              <label htmlFor="rate-note">Optional note for the teen</label>
              <textarea className="pl-textarea" id="rate-note" placeholder="e.g. Showed up on time, did great work" value={note} onChange={(e) => setNote(e.target.value)} disabled={saving} />
            </div>
            <div style={{ display: "flex", gap: 12 }}>
              <button className="pl-btn pl-btn-amber" onClick={submitRating} disabled={saving}>{saving ? "Saving…" : "Submit rating"}</button>
              <button className="pl-btn pl-btn-outline" onClick={() => setRatingTarget(null)} disabled={saving}>Cancel</button>
            </div>
          </div>
        ) : (
          !loading && (
            <>
              <h2 style={{ fontSize: 18, marginBottom: 12 }}>Open jobs with applicants</h2>
              {openJobs.length === 0 && <p style={{ color: "var(--ink-soft)", marginBottom: 24 }}>No pending applicants right now.</p>}
              {openJobs.map((job) => (
                <div className="pl-form-card" key={job.id} style={{ marginBottom: 16 }}>
                  <h3 style={{ marginBottom: 8 }}>{job.title}</h3>
                  {job.applicants.map((a) => (
                    <div key={a.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span>{a.profiles?.full_name || "Applicant"}</span>
                      <button className="pl-btn pl-btn-amber pl-btn-sm" onClick={() => acceptApplicant(job, a)} disabled={saving}>Accept applicant</button>
                    </div>
                  ))}
                </div>
              ))}

              <h2 style={{ fontSize: 18, margin: "28px 0 12px" }}>Assigned — mark complete when done</h2>
              {assignedJobs.length === 0 && <p style={{ color: "var(--ink-soft)", marginBottom: 24 }}>No jobs in progress right now.</p>}
              {assignedJobs.map((job) => (
                <div className="pl-form-card" key={job.id} style={{ marginBottom: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                    <div>
                      <h3 style={{ marginBottom: 4 }}>{job.title}</h3>
                      <p style={{ color: "var(--ink-soft)", fontSize: 14, margin: 0 }}>{teenNames[job.assigned_teen_id] || "Teen"} · {job.job_date} · exact address is now visible to them</p>
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button className="pl-btn pl-btn-outline pl-btn-sm" onClick={() => openChat(job.id)}>Message</button>
                      <button className="pl-btn pl-btn-amber pl-btn-sm" onClick={() => openRatingForm(job)}>Mark done & rate</button>
                    </div>
                  </div>
                </div>
              ))}

              <h2 style={{ fontSize: 18, margin: "28px 0 12px" }}>Completed jobs</h2>
              {completedJobs.length === 0 && <p style={{ color: "var(--ink-soft)" }}>None yet.</p>}
              {completedJobs.map((job) => {
                const r = job.ratings && job.ratings[0];
                return (
                  <div className="pl-form-card" key={job.id} style={{ marginBottom: 12 }}>
                    <h3 style={{ marginBottom: 4 }}>{job.title}</h3>
                    <p style={{ color: "var(--ink-soft)", fontSize: 14.5, margin: 0 }}>
                      {teenNames[job.assigned_teen_id] || "Teen"} · {job.job_date}{r ? ` · ${r.stars}★` : ""}
                    </p>
                  </div>
                );
              })}
            </>
          )
        )}

        <div style={{ marginTop: 28 }}>
          <button className="pl-btn pl-btn-outline pl-btn-sm" onClick={() => navigate("parents")}>Back to your jobs</button>
        </div>
      </div>
    </section>
  );
}

/* ------------------------------------------------------------------ */
/*  Page: Messages (per-job chat between homeowner and accepted teen) */

function MessagesPage({ navigate, user, jobId, openChat }) {
  const [job, setJob] = useState(null);
  const [otherName, setOtherName] = useState("");
  const [messages, setMessages] = useState([]);
  const [body, setBody] = useState("");
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [sending, setSending] = useState(false);
  const [inbox, setInbox] = useState([]);
  const [inboxLoading, setInboxLoading] = useState(true);
  const scrollRef = useRef(null);

  useEffect(() => {
    let active = true;
    async function loadInbox() {
      if (jobId || !user || !supabaseClient) { setInboxLoading(false); return; }
      setInboxLoading(true);
      if (user.role === "homeowner") {
        const { data } = await supabaseClient
          .from("jobs")
          .select("id, title, status, assigned_teen_id")
          .eq("homeowner_id", user.id)
          .in("status", ["assigned", "completed"]);
        const jobs = data || [];
        const teenIds = [...new Set(jobs.map((j) => j.assigned_teen_id).filter(Boolean))];
        let names = {};
        if (teenIds.length) {
          const { data: profs } = await supabaseClient.from("profiles").select("id, full_name").in("id", teenIds);
          (profs || []).forEach((p) => { names[p.id] = p.full_name; });
        }
        if (active) setInbox(jobs.map((j) => ({ id: j.id, title: j.title, otherName: names[j.assigned_teen_id] || "Teen" })));
      } else {
        const { data } = await supabaseClient
          .from("job_applications")
          .select("jobs(id, title, homeowner_id)")
          .eq("teen_id", user.id)
          .eq("status", "accepted");
        const jobs = (data || []).map((a) => a.jobs).filter(Boolean);
        const homeownerIds = [...new Set(jobs.map((j) => j.homeowner_id).filter(Boolean))];
        let names = {};
        if (homeownerIds.length) {
          const { data: profs } = await supabaseClient.from("profiles").select("id, full_name").in("id", homeownerIds);
          (profs || []).forEach((p) => { names[p.id] = p.full_name; });
        }
        if (active) setInbox(jobs.map((j) => ({ id: j.id, title: j.title, otherName: names[j.homeowner_id] || "Homeowner" })));
      }
      if (active) setInboxLoading(false);
    }
    loadInbox();
    return () => { active = false; };
  }, [jobId, user]);

  useEffect(() => {
    let active = true;
    let channel = null;

    async function load() {
      if (!supabaseClient || !user || !jobId) { setLoading(false); return; }
      setLoading(true);
      setError("");

      const { data: jobRow, error: jobErr } = await supabaseClient
        .from("jobs")
        .select("id, title, homeowner_id, assigned_teen_id, status")
        .eq("id", jobId)
        .single();

      if (jobErr || !jobRow) { if (active) { setError("Couldn't load this conversation."); setLoading(false); } return; }
      if (!active) return;
      setJob(jobRow);

      const otherId = user.role === "homeowner" ? jobRow.assigned_teen_id : jobRow.homeowner_id;
      if (otherId) {
        const { data: otherProfile } = await supabaseClient.from("profiles").select("full_name").eq("id", otherId).single();
        if (active) setOtherName(otherProfile?.full_name || "");
      }

      const { data: msgs, error: msgErr } = await supabaseClient
        .from("messages")
        .select("id, sender_id, body, created_at")
        .eq("job_id", jobId)
        .order("created_at", { ascending: true });

      if (msgErr) { if (active) { setError(msgErr.message); setLoading(false); } return; }
      if (active) { setMessages(msgs || []); setLoading(false); }

      channel = supabaseClient
        .channel("messages-" + jobId)
        .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages", filter: "job_id=eq." + jobId }, (payload) => {
          if (active) setMessages((prev) => (prev.some((m) => m.id === payload.new.id) ? prev : [...prev, payload.new]));
        })
        .subscribe();
    }

    load();
    return () => {
      active = false;
      if (channel) supabaseClient.removeChannel(channel);
    };
  }, [user, jobId]);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages]);

  const send = async (e) => {
    e.preventDefault();
    if (!body.trim() || !supabaseClient || !user || !jobId) return;
    setSending(true);
    const { error: sendErr } = await supabaseClient.from("messages").insert({ job_id: jobId, sender_id: user.id, body: body.trim() });
    setSending(false);
    if (sendErr) { setError(sendErr.message); return; }
    setBody("");
  };

  if (!user) {
    return (
      <section className="pl-section">
        <div className="pl-wrap" style={{ maxWidth: 520 }}>
          <div className="pl-eyebrow"><Beacon /> Messages</div>
          <h1 style={{ fontSize: "clamp(26px,3.2vw,34px)", marginBottom: 12 }}>Log in to view your messages.</h1>
          <button className="pl-btn pl-btn-amber" onClick={() => navigate("login")}>Log in / sign up</button>
        </div>
      </section>
    );
  }

  if (!jobId) {
    return (
      <section className="pl-section">
        <div className="pl-wrap" style={{ maxWidth: 560 }}>
          <div className="pl-eyebrow"><Beacon /> Messages</div>
          <h1 style={{ fontSize: "clamp(26px,3.2vw,34px)", marginBottom: 16 }}>Your conversations.</h1>

          {inboxLoading && <p style={{ color: "var(--ink-soft)" }}>Loading…</p>}

          {!inboxLoading && inbox.length === 0 && (
            <p className="pl-lede">
              No conversations yet. {user.role === "homeowner" ? "These open up once you accept an applicant for one of your jobs." : "This opens up once a homeowner accepts you for a job."}
            </p>
          )}

          {!inboxLoading && inbox.map((c) => (
            <button
              key={c.id}
              onClick={() => openChat(c.id)}
              className="pl-form-card"
              style={{ display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", textAlign: "left", marginBottom: 12, cursor: "pointer", border: "1px solid var(--line)", background: "var(--white)" }}
            >
              <div>
                <h3 style={{ marginBottom: 4 }}>{c.title}</h3>
                <p style={{ color: "var(--ink-soft)", fontSize: 14, margin: 0 }}>With {c.otherName}</p>
              </div>
              <IconChat />
            </button>
          ))}
        </div>
      </section>
    );
  }

  return (
    <section className="pl-section">
      <div className="pl-wrap" style={{ maxWidth: 640 }}>
        <div className="pl-eyebrow"><Beacon /> Messages</div>
        <h1 style={{ fontSize: "clamp(26px,3.2vw,34px)", marginBottom: 4 }}>{job ? job.title : "Conversation"}</h1>
        <p style={{ color: "var(--ink-soft)", marginBottom: 6 }}>{otherName ? `With ${otherName}` : ""}</p>
        <div className="pl-age-note" style={{ marginBottom: 20 }}>
          <IconAlert /><span>For your safety, keep every conversation in Porchlight — never share phone numbers, email, or social media here.</span>
        </div>

        {error && <div className="pl-age-note" style={{ marginBottom: 16 }}><IconAlert /><span>{error}</span></div>}

        <div
          ref={scrollRef}
          className="pl-note-card"
          style={{ height: 380, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}
        >
          {loading && <p style={{ color: "var(--ink-soft)" }}>Loading…</p>}
          {!loading && messages.length === 0 && <p style={{ color: "var(--ink-soft)" }}>No messages yet — say hello.</p>}
          {messages.map((m) => {
            const mine = m.sender_id === user.id;
            return (
              <div key={m.id} style={{ alignSelf: mine ? "flex-end" : "flex-start", maxWidth: "75%" }}>
                <div
                  style={{
                    background: mine ? "var(--amber)" : "var(--card)",
                    color: mine ? "#3a2705" : "var(--ink)",
                    borderRadius: 14,
                    padding: "10px 14px",
                    fontSize: 14.5,
                  }}
                >
                  {m.body}
                </div>
                <p style={{ fontSize: 11, color: "var(--ink-soft)", margin: "4px 4px 0", textAlign: mine ? "right" : "left" }}>
                  {new Date(m.created_at).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}
                </p>
              </div>
            );
          })}
        </div>

        <form onSubmit={send} style={{ display: "flex", gap: 10 }}>
          <input
            className="pl-input"
            style={{ flex: 1 }}
            value={body}
            onChange={(e) => setBody(e.target.value)}
            placeholder="Type a message…"
            disabled={sending}
          />
          <button type="submit" className="pl-btn pl-btn-amber" disabled={sending || !body.trim()}>Send</button>
        </form>
      </div>
    </section>
  );
}

function ProfilePage({ navigate, user, setUser, openChat }) {
  const [nameInput, setNameInput] = useState(user?.name || "");
  const [savingName, setSavingName] = useState(false);
  const [nameSaved, setNameSaved] = useState(false);
  const [nameError, setNameError] = useState("");

  const [fiveStarCount, setFiveStarCount] = useState(0);
  const [totalRatings, setTotalRatings] = useState(0);
  const [listings, setListings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [revealed, setRevealed] = useState({}); // jobId -> { address } | "loading" | "error"

  useEffect(() => {
    let active = true;
    async function load() {
      if (!supabaseClient || !user) { setLoading(false); return; }
      setLoading(true);
      if (user.role === "homeowner") {
        const { data } = await supabaseClient
          .from("jobs")
          .select("id, title, category, status, pay_amount, job_date")
          .eq("homeowner_id", user.id)
          .order("job_date", { ascending: false });
        if (active) setListings(data || []);
      } else if (user.role === "teen") {
        const { data } = await supabaseClient
          .from("job_applications")
          .select("id, status, jobs(id, title, category, pay_amount, job_date)")
          .eq("teen_id", user.id);
        if (active) setListings(data || []);

        const { data: ratingsData } = await supabaseClient.from("ratings").select("stars").eq("teen_id", user.id);
        if (active) {
          const all = ratingsData || [];
          setTotalRatings(all.length);
          setFiveStarCount(all.filter((r) => r.stars === 5).length);
        }
      }
      if (active) setLoading(false);
    }
    load();
    return () => { active = false; };
  }, [user]);

  const revealAddress = async (jobId) => {
    setRevealed((prev) => ({ ...prev, [jobId]: "loading" }));
    const { data, error } = await supabaseClient.rpc("get_job_exact_location", { p_job_id: jobId });
    const row = data && data[0];
    if (error || !row || !row.exact_address) {
      setRevealed((prev) => ({ ...prev, [jobId]: "error" }));
      return;
    }
    setRevealed((prev) => ({ ...prev, [jobId]: row.exact_address }));
  };

  const saveName = async (e) => {
    e.preventDefault();
    if (!nameInput.trim()) { setNameError("Name can't be empty."); return; }
    setNameError(""); setSavingName(true);
    const { error } = await supabaseClient.from("profiles").update({ full_name: nameInput.trim() }).eq("id", user.id);
    setSavingName(false);
    if (error) { setNameError(error.message); return; }
    setUser((prev) => ({ ...prev, name: nameInput.trim() }));
    setNameSaved(true);
    setTimeout(() => setNameSaved(false), 2500);
  };

  if (!user) {
    return (
      <section className="pl-section">
        <div className="pl-wrap" style={{ maxWidth: 560 }}>
          <div className="pl-eyebrow"><Beacon /> Your account</div>
          <h1 style={{ fontSize: "clamp(26px,3.2vw,36px)", marginBottom: 12 }}>Log in to view your profile.</h1>
          <button className="pl-btn pl-btn-amber" onClick={() => navigate("login")}>Log in / sign up</button>
        </div>
      </section>
    );
  }

  const tier = user.role === "teen" ? getBadgeTier(fiveStarCount) : null;

  return (
    <section className="pl-section">
      <div className="pl-wrap" style={{ maxWidth: 720 }}>
        <div className="pl-eyebrow"><Beacon /> Your account</div>
        <h1 style={{ fontSize: "clamp(28px,3.6vw,40px)", marginBottom: 6 }}>{user.name}</h1>
        <p style={{ color: "var(--ink-soft)", marginBottom: 24 }}>
          {user.email} · {user.role === "teen" ? "Teen worker" : "Homeowner"}{user.role === "teen" && user.age ? ` · Age ${user.age}` : ""}
        </p>

        {user.role === "teen" && (
          <div className="pl-form-card" style={{ marginBottom: 24, display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
            {tier && <BadgeIcon tier={tier} size={48} />}
            <div>
              <h3 style={{ marginBottom: 4 }}>{tier ? `${tier.name} tier` : "No badge yet"}</h3>
              <p style={{ color: "var(--ink-soft)", fontSize: 14, margin: 0 }}>
                {fiveStarCount} five-star rating{fiveStarCount === 1 ? "" : "s"}
                {totalRatings > fiveStarCount ? ` (${totalRatings} ratings total)` : ""} — this updates automatically as homeowners rate your completed jobs. There's no way to set this yourself.
              </p>
            </div>
          </div>
        )}

        <div className="pl-form-card" style={{ marginBottom: 24 }}>
          <h3 style={{ marginBottom: 14 }}>Settings</h3>
          <form onSubmit={saveName}>
            <div className="pl-field">
              <label htmlFor="profile-name">Full name</label>
              <input className="pl-input" id="profile-name" value={nameInput} onChange={(e) => setNameInput(e.target.value)} />
            </div>
            {nameError && <div className="pl-age-note"><IconAlert /><span>{nameError}</span></div>}
            {nameSaved && <div className="pl-confirm"><IconCheck /> Saved.</div>}
            <button type="submit" className="pl-btn pl-btn-outline pl-btn-sm" disabled={savingName}>{savingName ? "Saving…" : "Save changes"}</button>
          </form>
        </div>

        <h2 style={{ fontSize: 18, margin: "8px 0 12px" }}>{user.role === "homeowner" ? "Your posted jobs" : "Your applications"}</h2>
        {loading && <p style={{ color: "var(--ink-soft)" }}>Loading…</p>}

        {user.role === "homeowner" && !loading && (
          listings.length === 0 ? (
            <p style={{ color: "var(--ink-soft)" }}>You haven't posted any jobs yet.</p>
          ) : (
            listings.map((j) => (
              <div className="pl-form-card" key={j.id} style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                  <div>
                    <h3 style={{ marginBottom: 4 }}>{j.title}</h3>
                    <p style={{ color: "var(--ink-soft)", fontSize: 14, margin: 0 }}>{j.category} · ${j.pay_amount} · {j.job_date}</p>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span className="pl-job-cat">{j.status}</span>
                    {(j.status === "open" || j.status === "assigned") && (
                      <button className="pl-btn pl-btn-outline pl-btn-sm" onClick={() => navigate("rate-job")}>
                        {j.status === "open" ? "View applicants" : "Manage"}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            ))
          )
        )}

        {user.role === "teen" && !loading && (
          listings.length === 0 ? (
            <p style={{ color: "var(--ink-soft)" }}>You haven't applied to any jobs yet.</p>
          ) : (
            listings.map((a) => (
              <div className="pl-form-card" key={a.id} style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                  <div>
                    <h3 style={{ marginBottom: 4 }}>{a.jobs?.title}</h3>
                    <p style={{ color: "var(--ink-soft)", fontSize: 14, margin: 0 }}>{a.jobs?.category} · ${a.jobs?.pay_amount} · {a.jobs?.job_date}</p>
                  </div>
                  <span className="pl-job-cat">{a.status}</span>
                </div>
                {a.status === "accepted" && (
                  <div style={{ marginTop: 12, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                    <button className="pl-btn pl-btn-amber pl-btn-sm" onClick={() => openChat(a.jobs.id)}>Message homeowner</button>
                    {!revealed[a.jobs?.id] && (
                      <button className="pl-btn pl-btn-outline pl-btn-sm" onClick={() => revealAddress(a.jobs.id)}>View exact address</button>
                    )}
                    {revealed[a.jobs?.id] === "loading" && <p style={{ color: "var(--ink-soft)", fontSize: 14 }}>Loading…</p>}
                    {revealed[a.jobs?.id] === "error" && <p style={{ color: "var(--ink-soft)", fontSize: 14 }}>Couldn't load the address right now.</p>}
                    {revealed[a.jobs?.id] && !["loading", "error"].includes(revealed[a.jobs?.id]) && (
                      <p style={{ fontSize: 14.5, fontWeight: 700, margin: 0 }}><IconMap /> {revealed[a.jobs.id]}</p>
                    )}
                  </div>
                )}
              </div>
            ))
          )
        )}
      </div>
    </section>
  );
}

function AuthPage({ navigate, setUser, siteMode }) {
  const [mode, setMode] = useState("login");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [role, setRole] = useState("homeowner");
  const [age, setAge] = useState("");
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");
  const [loading, setLoading] = useState(false);

  const loadProfileAndSignIn = async (authUser) => {
    const { data: profile, error: profileErr } = await supabaseClient
      .from("profiles")
      .select("full_name, role, age")
      .eq("id", authUser.id)
      .single();
    if (profileErr) { setError("Signed in, but couldn't load your profile: " + profileErr.message); return; }
    setUser({ id: authUser.id, name: profile.full_name, email: authUser.email, role: profile.role, age: profile.age });
    if (profile.role === "teen") {
      const { data: consent } = await supabaseClient.from("parent_consents").select("id").eq("teen_id", authUser.id).single();
      navigate(consent ? "home" : "consent");
      return;
    }
    navigate("home");
  };

  const submitLogin = async (e) => {
    e.preventDefault();
    if (!supabaseClient) { setError("Supabase isn't configured yet — check SUPABASE_URL/SUPABASE_ANON_KEY at the top of the file."); return; }
    if (!email || !password) { setError("Enter your email and password."); return; }
    setError(""); setInfo(""); setLoading(true);
    const { data, error: signInErr } = await supabaseClient.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (signInErr) { setError(signInErr.message); return; }
    await loadProfileAndSignIn(data.user);
  };

  const submitSignup = async (e) => {
    e.preventDefault();
    if (!supabaseClient) { setError("Supabase isn't configured yet — check SUPABASE_URL/SUPABASE_ANON_KEY at the top of the file."); return; }
    if (!name || !email || !password) { setError("Fill in your name, email, and password."); return; }
    if (password.length < 8) { setError("Password must be at least 8 characters."); return; }
    if (role === "teen") {
      const ageNum = Number(age);
      if (!age || ageNum < 13 || ageNum > 17) { setError("Teen workers must be between 13 and 17."); return; }
    }
    setError(""); setInfo(""); setLoading(true);
    const { data, error: signUpErr } = await supabaseClient.auth.signUp({
      email,
      password,
      options: {
        data: {
          full_name: name,
          role,
          age: role === "teen" ? Number(age) : null,
        },
      },
    });
    setLoading(false);
    if (signUpErr) { setError(signUpErr.message); return; }
    // If email confirmation is required, there's no session yet — tell them to check their inbox.
    if (!data.session) {
      setInfo("Account created! Check your email to confirm it, then come back and log in.");
      setMode("login");
      return;
    }
    await loadProfileAndSignIn(data.user);
  };

  if (siteMode === "waitlist") {
    return (
      <section className="pl-section">
        <div className="pl-wrap" style={{ maxWidth: 520 }}>
          <div className="pl-eyebrow"><Beacon /> Account</div>
          <h1 style={{ fontSize: "clamp(26px,3.4vw,34px)", marginBottom: 12 }}>Porchlight isn't open yet.</h1>
          <p className="pl-lede" style={{ marginBottom: 24 }}>
            We're building in one town first and aren't creating accounts until the safety infrastructure is finished, not promised. Join the waitlist and we'll tell you the day it opens — and what we finished in the meantime.
          </p>
          <WaitlistForm />
        </div>
      </section>
    );
  }

  return (
    <section className="pl-section">
      <div className="pl-wrap" style={{ maxWidth: 460 }}>
        <div className="pl-eyebrow"><Beacon /> Account</div>
        <h1 style={{ fontSize: "clamp(26px,3.4vw,34px)", marginBottom: 20 }}>
          {mode === "login" ? "Welcome back." : "Create your account."}
        </h1>

        <div className="pl-tabs" role="tablist" aria-label="Log in or sign up">
          <button className="pl-tab-btn" role="tab" aria-selected={mode === "login"} onClick={() => { setMode("login"); setError(""); }}>Log in</button>
          <button className="pl-tab-btn" role="tab" aria-selected={mode === "signup"} onClick={() => { setMode("signup"); setError(""); }}>Sign up</button>
        </div>

        <div className="pl-form-card">
          {mode === "login" ? (
            <form onSubmit={submitLogin}>
              <div className="pl-field">
                <label htmlFor="login-email">Email</label>
                <input className="pl-input" id="login-email" type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" required />
              </div>
              <div className="pl-field">
                <label htmlFor="login-password">Password</label>
                <input className="pl-input" id="login-password" type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" required />
              </div>
              {info && <div className="pl-confirm">{info}</div>}
              {error && <div className="pl-age-note"><IconAlert /><span>{error}</span></div>}
              <button type="submit" className="pl-btn pl-btn-amber" style={{ width: "100%", marginTop: 8 }} disabled={loading}>{loading ? "Logging in…" : "Log in"}</button>
            </form>
          ) : (
            <form onSubmit={submitSignup}>
              <div className="pl-field">
                <label>I'm signing up as a</label>
                <div className="pl-age-toggle" role="group" aria-label="Account type" style={{ marginTop: 4 }}>
                  <button type="button" className="pl-age-btn" aria-pressed={role === "homeowner"} onClick={() => setRole("homeowner")}>Homeowner</button>
                  <button type="button" className="pl-age-btn" aria-pressed={role === "teen"} onClick={() => setRole("teen")}>Teen worker</button>
                </div>
              </div>
              <div className="pl-field">
                <label htmlFor="signup-name">Full name</label>
                <input className="pl-input" id="signup-name" value={name} onChange={(e) => setName(e.target.value)} placeholder="Jordan Taylor" required />
              </div>
              {role === "teen" && (
                <div className="pl-field">
                  <label htmlFor="signup-age">Age</label>
                  <input className="pl-input" id="signup-age" type="number" min="13" max="17" value={age} onChange={(e) => setAge(e.target.value)} placeholder="13–17" required />
                </div>
              )}
              <div className="pl-field">
                <label htmlFor="signup-email">Email</label>
                <input className="pl-input" id="signup-email" type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" required />
              </div>
              <div className="pl-field">
                <label htmlFor="signup-password">Password</label>
                <input className="pl-input" id="signup-password" type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="At least 8 characters" required />
              </div>
              {info && <div className="pl-confirm">{info}</div>}
              {error && <div className="pl-age-note"><IconAlert /><span>{error}</span></div>}
              <button type="submit" className="pl-btn pl-btn-amber" style={{ width: "100%", marginTop: 8 }} disabled={loading}>{loading ? "Creating account…" : "Sign up"}</button>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}

/* ------------------------------------------------------------------ */
/*  App shell + router (custom, dependency-free — no new tabs, no      */
/*  full page reloads; a stack drives Back / Home)                     */
/* ------------------------------------------------------------------ */
function PorchlightApp() {
  const [stack, setStack] = useState(["home"]);
  const current = stack[stack.length - 1];
  const scrollRef = useRef(null);
  const [homeownerStatus, setHomeownerStatus] = useState("none");
  const [user, setUser] = useState(null);
  const [chatJobId, setChatJobId] = useState(null);

  // Founders can still see and test the full working app on the real
  // deployed link by adding ?preview=porchlight2026 to the URL — everyone
  // else sees whatever SITE_MODE is set to above.
  const isPreview = typeof window !== "undefined" && new URLSearchParams(window.location.search).get("preview") === "porchlight2026";
  const siteMode = isPreview ? "live" : SITE_MODE;

  const navigate = (key) => {
    if (key === current) return;
    setStack((prev) => [...prev, key]);
  };
  const goBack = () => setStack((prev) => (prev.length > 1 ? prev.slice(0, -1) : prev));
  const goHome = () => setStack((prev) => (prev[prev.length - 1] === "home" ? prev : [...prev, "home"]));
  const openChat = (jobId) => {
    setChatJobId(jobId);
    navigate("messages");
  };
  const openMessagesInbox = () => {
    setChatJobId(null);
    navigate("messages");
  };

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTo({ top: 0, behavior: "auto" });
  }, [current]);

  // Load the signed-in profile (and homeowner verification status, if relevant)
  // from Supabase, given a raw auth user object.
  const hydrateUser = async (authUser) => {
    if (!authUser || !supabaseClient) { setUser(null); return; }
    const { data: profile } = await supabaseClient
      .from("profiles")
      .select("full_name, role, age")
      .eq("id", authUser.id)
      .single();
    if (!profile) { setUser(null); return; }
    setUser({ id: authUser.id, name: profile.full_name, email: authUser.email, role: profile.role, age: profile.age });
    if (profile.role === "homeowner") {
      const { data: verification } = await supabaseClient
        .from("homeowner_verification")
        .select("status")
        .eq("homeowner_id", authUser.id)
        .single();
      setHomeownerStatus(verification ? verification.status : "none");
    }
  };

  // On first load, restore whatever session is already stored in the browser
  // (this is what keeps someone logged in after a refresh), then keep listening
  // for sign-in/sign-out events from anywhere in the app.
  useEffect(() => {
    if (!supabaseClient) return;
    supabaseClient.auth.getSession().then(({ data }) => {
      if (data.session) hydrateUser(data.session.user);
    });
    const { data: listener } = supabaseClient.auth.onAuthStateChange((_event, session) => {
      if (session) hydrateUser(session.user);
      else { setUser(null); setHomeownerStatus("none"); }
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  const handleLogout = async () => {
    if (supabaseClient) await supabaseClient.auth.signOut();
    setUser(null);
    setHomeownerStatus("none");
  };

  let Page;
  if (current === "home") Page = <HomePage navigate={navigate} siteMode={siteMode} />;
  else if (current === "parents") Page = <ParentsPage navigate={navigate} user={user} homeownerStatus={homeownerStatus} setHomeownerStatus={setHomeownerStatus} />;
  else if (current === "teens") Page = <TeensPage navigate={navigate} />;
  else if (current === "consent") Page = <ConsentPage navigate={navigate} user={user} />;
  else if (current === "post-job") Page = <PostJobPage navigate={navigate} homeownerStatus={homeownerStatus} user={user} />;
  else if (current === "browse-jobs") Page = <BrowseJobsPage navigate={navigate} user={user} />;
  else if (current === "safety") Page = <SafetyPage navigate={navigate} />;
  else if (current === "rate-job") Page = <RateJobPage navigate={navigate} user={user} openChat={openChat} />;
  else if (current === "login") Page = <AuthPage navigate={navigate} setUser={setUser} siteMode={siteMode} />;
  else if (current === "pricing") Page = <PricingPage navigate={navigate} />;
  else if (current === "profile") Page = <ProfilePage navigate={navigate} user={user} setUser={setUser} openChat={openChat} />;
  else if (current === "messages") Page = <MessagesPage navigate={navigate} user={user} jobId={chatJobId} openChat={openChat} />;

  return (
    <div className="pl-root" ref={scrollRef}>
      <GlobalStyle />
      <ModeBanner mode={siteMode} />
      <SiteHeader current={current} navigate={navigate} goBack={goBack} goHome={goHome} canGoBack={stack.length > 1} user={user} onLogout={handleLogout} siteMode={siteMode} onOpenMessages={openMessagesInbox} />
      <main>{Page}</main>
      <SiteFooter navigate={navigate} siteMode={siteMode} user={user} />
      <ReferralModal user={user} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PorchlightApp />);
</script>
